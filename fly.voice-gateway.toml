# Copy this file to fly.toml or pass it explicitly with `fly deploy -c fly.voice-gateway.toml`.
# Update `app` to a globally unique Fly app name before the first deploy.
app = "ai-receptionist-voice-dev-raphael"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.voice-gateway"

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
