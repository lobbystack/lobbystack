# Copy this file to fly.toml or pass it explicitly with `fly deploy -c fly.voice-gateway.toml`.
# Update `app` to a globally unique Fly app name before the first deploy.
app = "ai-receptionist-voice-dev-raphael"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.voice-gateway"

[env]
  PORT = "3001"
  VOICE_GATEWAY_TRUST_PROXY = "true"
  # Dev Fly gateway is also used by the local landing app when no public endpoint override is set.
  WEB_CALL_ALLOWED_ORIGINS = "https://lobbystack.com,https://www.lobbystack.com,http://localhost:4321,http://127.0.0.1:4321"

[http_service]
  internal_port = 3001
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
