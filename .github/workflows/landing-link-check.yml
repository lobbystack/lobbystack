name: Landing link check

on:
  push:
    paths:
      - "apps/landing/src/**"
      - "apps/landing/public/**"
      - "apps/landing/astro.config.mjs"
      - ".github/workflows/landing-link-check.yml"
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter landing build
      - name: Start landing preview server
        run: |
          npx --yes serve apps/landing/dist -l 4173 &
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ > /dev/null && exit 0
            sleep 1
          done
          echo "Landing preview server failed to start"
          exit 1
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --base-url http://127.0.0.1:4173
            --remap https://lobbystack.com http://127.0.0.1:4173
            --exclude '^https://app\.lobbystack\.com/'
            --exclude '^https://voice\.lobbystack\.com/web-call/'
            --exclude '^https://voice-dev\.lobbystack\.com/web-call/'
            --exclude '^https://.*\.fly\.dev/web-call/'
            --exclude '^https://theresanaiforthat\.com/ai/lobbystack/'
            --exclude '^https://www\.bls\.gov/ooh/Office-and-Administrative-Support/Receptionists\.htm$'
            --exclude '^https://www\.hhs\.gov/hipaa/for-professionals/special-topics/health-information-technology/cloud-computing/$'
            --exclude '^https://openai\.com/api/pricing/$'
            --exclude '^https://www\.twilio\.com/'
            './apps/landing/src/**/*.astro'
            './apps/landing/src/**/*.tsx'
            './apps/landing/src/content/**/*.md'
            './apps/landing/public/llms.txt'
          fail: true
