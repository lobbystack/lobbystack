name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - name: Validate self-hosted Compose config
        run: |
          INSTANCE_SECRET=deadbeefdeadbeefdeadbeefdeadbeef \
          INTERNAL_SERVICE_TOKEN=ci-self-hosted-token \
          VITE_WEB_CALL_ENDPOINT=http://127.0.0.1:3001/web-call/sessions \
          docker compose -f docker-compose.self-hosted.yml config --quiet
