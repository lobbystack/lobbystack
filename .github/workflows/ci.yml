name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  deploy_web_worker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-worker-production
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write
    env:
      VITE_CONVEX_URL: ${{ vars.VITE_CONVEX_URL }}
      VITE_CONVEX_SITE_URL: ${{ vars.VITE_CONVEX_SITE_URL }}
      VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
      VITE_DEPLOYMENT_MODE: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Validate Cloudflare build inputs
        run: |
          test -n "$VITE_CONVEX_URL"
          test -n "$VITE_CONVEX_SITE_URL"
      - run: pnpm --filter @ai-receptionist/web build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          command: deploy --config apps/web/wrangler.jsonc
